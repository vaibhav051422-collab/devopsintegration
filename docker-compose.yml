services:
  reverse-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    environment:
      
      - MONGO_URL=mongodb://db:27017/metadata_db
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    depends_on:
      - db
      - minio
    networks:
      - app-network

  db:
    image: mongo:latest
  
    networks:
      - app-network

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    
    command: server /data --console-address ":9001"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge